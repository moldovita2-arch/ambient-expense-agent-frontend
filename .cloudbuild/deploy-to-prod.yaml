steps:

  # Build and Push
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        docker build \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA \
          --build-arg COMMIT_SHA=$COMMIT_SHA \
          .
        docker push $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA

  # Deploy to Prod via gcloud run deploy
  - name: "gcr.io/cloud-builders/gcloud"
    id: trigger-deployment
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        gcloud run deploy ambient-expense-agent-frontend \
          --image $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA \
          --project ${_PROD_PROJECT_ID} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --service-account ${_APP_SERVICE_ACCOUNT_PROD}

substitutions:
  _PROD_PROJECT_ID: YOUR_PROD_PROJECT_ID
  _REGION: us-east1
  _APP_SERVICE_ACCOUNT_PROD: ambient-expense-agent-app@gen-lang-client-0675989879.iam.gserviceaccount.com

logsBucket: gs://${PROJECT_ID}-ambient-expense-agent-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
