steps:
  # Install dependencies
  - name: "node:22-alpine"
    id: install-dependencies
    entrypoint: npm
    args:
      - "ci"

  # Run linting
  - name: "node:22-alpine"
    id: run-lint
    entrypoint: npm
    args:
      - "run"
      - "lint"

  # Build to ensure it compiles
  - name: "node:22-alpine"
    id: run-build
    entrypoint: npm
    args:
      - "run"
      - "build"

logsBucket: gs://${PROJECT_ID}-ambient-expense-agent-logs/build-logs
options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
